<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Flavors of the World</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff8f0;color:#333;}

/* Container */
.container{
  display:flex;min-height:100vh;overflow:hidden;
}

/* Left Side */
.left{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#ff9a8b,#ff6a88,#ff99ac,#feca57);
  color:white;padding:3rem;position:relative;text-align:center;
}
.left::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:100%;
  background:url("https://www.transparenttextures.com/patterns/food.png");
  opacity:0.15;z-index:0;
}
.left h2{font-size:2.8rem;font-weight:700;margin-bottom:1rem;z-index:1;}
.left p{font-size:1.1rem;max-width:350px;opacity:0.95;z-index:1;}
.left img{
  max-width:75%;border-radius:25px;margin-top:2rem;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);z-index:1;
  transition:0.4s ease;
}
.left img:hover{transform:scale(1.05);}

/* Right Side (Form Card) */
.right{
  flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:#fff;position:relative;
}
.form-card{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  padding:3rem 2.5rem;
  border-radius:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  max-width:420px;width:100%;
}
.form-card h2{
  font-size:2rem;font-weight:700;margin-bottom:2rem;text-align:center;
  background:linear-gradient(90deg,#ff6b6b,#ff9f43,#1dd1a1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* Input Groups */
.form-group{position:relative;margin-bottom:1.8rem;}
.form-group input{
  width:100%;padding:0.9rem 1rem;border:1px solid #ddd;border-radius:12px;
  font-size:1rem;outline:none;background:#fafafa;transition:0.3s;
}
.form-group input:focus{
  border-color:#ff9f43;background:#fff;box-shadow:0 0 8px rgba(255,159,67,0.3);
}
.form-group label{
  position:absolute;top:50%;left:1rem;transform:translateY(-50%);
  background:#fff;padding:0 0.3rem;color:#aaa;font-size:0.95rem;
  pointer-events:none;transition:0.3s;
}
.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label{
  top:-10px;left:0.8rem;font-size:0.8rem;color:#ff6b6b;
}

/* Button */
button{
  width:100%;padding:0.9rem;border:none;border-radius:30px;
  background:linear-gradient(135deg,#ff6b6b,#ff9f43,#ff6a88);
  color:white;font-size:1rem;font-weight:600;cursor:pointer;transition:0.3s;
}
button:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 20px rgba(255,107,107,0.35);
}

/* Redirect */
.signin-redirect{margin-top:1.2rem;text-align:center;font-size:0.9rem;}
.signin-redirect a{color:#ff6b6b;font-weight:600;transition:0.3s;}
.signin-redirect a:hover{color:#1dd1a1;}


/* Tablets */
@media(max-width:992px){
  .container{flex-direction:column;}
  .left,.right{width:100%;padding:2rem;}
  .left h2{font-size:2.4rem;}
  .left p{font-size:1rem;}
  .left img{max-width:60%;}
  .form-card{max-width:500px;}
}

/* Large Phones */
@media(max-width:768px){
  .left h2{font-size:2rem;}
  .left p{font-size:0.95rem;}
  .left img{max-width:70%;margin-top:1.5rem;}
  .form-card{padding:2rem;}
  .form-card h2{font-size:1.7rem;}
  .form-group input{font-size:0.95rem;padding:0.8rem 1rem;}
  button{font-size:0.95rem;padding:0.8rem;}
}

/* Small Phones */
@media(max-width:480px){
  .left{padding:1.5rem;}
  .left h2{font-size:1.6rem;}
  .left p{font-size:0.85rem;}
  .left img{max-width:80%;margin-top:1rem;}
  .form-card{padding:1.5rem;border-radius:20px;}
  .form-card h2{font-size:1.4rem;}
  .form-group{margin-bottom:1.2rem;}
  .form-group input{font-size:0.85rem;padding:0.7rem;}
  button{font-size:0.9rem;padding:0.7rem;}
}
</style>
</head>
<body>

<div class="container">
  <!-- Left Side -->
  <div class="left">
    <h2>Join Flavors of the World</h2>
    <p>Create your account and explore multi-cuisine delights from around the globe!</p>
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Cuisine Illustration">
  </div>

  <!-- Right Side -->
  <div class="right">
    <div class="form-card">
      <h2>Create Account</h2>
      <form>
        <div class="form-group">
          <input type="text" name="name" required placeholder=" ">
          <label>Full Name</label>
        </div>
        <div class="form-group">
          <input type="email" name="email" required placeholder=" ">
          <label>Email Address</label>
        </div>
        <div class="form-group">
          <input type="password" name="password" required placeholder=" ">
          <label>Password</label>
        </div>
        <div class="form-group">
          <input type="password" name="confirm_password" required placeholder=" ">
          <label>Confirm Password</label>
        </div>
        <button type="submit">Register</button>
      </form>
      <div class="signin-redirect">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
